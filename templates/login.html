<!DOCTYPE html>
<html>
<head>
    <title>ETI Staff Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #0f2438 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            width: 110px;
            height: 110px;
            margin-bottom: 16px;
        }

        h2 {
            color: #1a3a5c;
            font-size: 22px;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #6b7785;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            color: #34495e;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dde3e8;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1a3a5c;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0f2438;
        }

        .error {
            background: #fdecea;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: #9aa5b1;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='images/eti_logo.png') }}" alt="ETI Logo" class="logo">
        <h2>Educational Trust of India</h2>
        <p class="subtitle">Staff Portal — Authorized Access Only</p>

        <form method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <p class="footer-text">© Educational Trust of India</p>
    </div>
</body>
</html>
